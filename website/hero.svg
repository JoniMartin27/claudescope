<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161d"/>
      <stop offset="1" stop-color="#0e0f13"/>
    </linearGradient>
    <radialGradient id="glow1" cx="12%" cy="0%" r="60%">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="0%" r="55%">
      <stop offset="0" stop-color="#36c5d0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#36c5d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7e9ee"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97757"/><stop offset="1" stop-color="#b18cf0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36c5d0"/><stop offset="1" stop-color="#b18cf0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#glow1)"/>
  <rect width="1280" height="440" fill="url(#glow2)"/>

  <!-- left: brand + copy -->
  <text x="64" y="118" font-size="58">🔭</text>
  <text x="140" y="112" font-size="52" font-weight="800" fill="url(#title)" letter-spacing="-1">ClaudeScope</text>
  <text x="142" y="150" font-size="21" fill="#9aa3b2">Local-first analytics &amp; full-text search for your Claude Code sessions</text>

  <!-- value props -->
  <g font-size="17" fill="#c7ccd6">
    <text x="66" y="212">🔒  100% local — zero network requests, ever</text>
    <text x="66" y="246">📊  Tokens, cost, tools, projects &amp; activity at a glance</text>
    <text x="66" y="280">🔎  Search every prompt, reply &amp; tool call you've ever run</text>
    <text x="66" y="314">⚡  One command, no config, no build step</text>
  </g>

  <!-- command pill -->
  <rect x="66" y="346" rx="10" width="300" height="52" fill="#1a1d26" stroke="#2a2f3c"/>
  <text x="88" y="379" font-size="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#4ade80">$ npx claudescope</text>

  <!-- right: stylized dashboard preview -->
  <g transform="translate(720, 56)">
    <rect width="496" height="328" rx="16" fill="#16181f" stroke="#2a2f3c"/>

    <!-- mini stat cards -->
    <g transform="translate(20,20)">
      <rect width="142" height="62" rx="9" fill="#20242f" stroke="#2a2f3c"/>
      <rect width="142" height="3" rx="2" fill="#d97757"/>
      <text x="12" y="28" font-size="10" fill="#9aa3b2" letter-spacing="0.5">TOKENS</text>
      <text x="12" y="50" font-size="22" font-weight="700" fill="#e7e9ee">7.1B</text>

      <rect x="156" width="142" height="62" rx="9" fill="#20242f" stroke="#2a2f3c"/>
      <rect x="156" width="142" height="3" rx="2" fill="#4ade80"/>
      <text x="168" y="28" font-size="10" fill="#9aa3b2" letter-spacing="0.5">EST. API COST</text>
      <text x="168" y="50" font-size="22" font-weight="700" fill="#e7e9ee">$18.5k</text>

      <rect x="312" width="142" height="62" rx="9" fill="#20242f" stroke="#2a2f3c"/>
      <rect x="312" width="142" height="3" rx="2" fill="#36c5d0"/>
      <text x="324" y="28" font-size="10" fill="#9aa3b2" letter-spacing="0.5">SESSIONS</text>
      <text x="324" y="50" font-size="22" font-weight="700" fill="#e7e9ee">93</text>
    </g>

    <!-- donut -->
    <g transform="translate(78,200)">
      <circle r="44" fill="none" stroke="#4ade80" stroke-width="15" stroke-dasharray="210 66" transform="rotate(-90)"/>
      <circle r="44" fill="none" stroke="#b18cf0" stroke-width="15" stroke-dasharray="11 265" stroke-dashoffset="-210" transform="rotate(-90)"/>
      <circle r="44" fill="none" stroke="#d97757" stroke-width="15" stroke-dasharray="4 272" stroke-dashoffset="-221" transform="rotate(-90)"/>
      <text x="0" y="2" text-anchor="middle" font-size="16" font-weight="700" fill="#e7e9ee">7.1B</text>
      <text x="0" y="18" text-anchor="middle" font-size="9" fill="#6b7280">tokens</text>
    </g>

    <!-- bars -->
    <g transform="translate(168,108)" font-size="11" fill="#9aa3b2">
      <text x="0" y="40">Bash</text>
      <rect x="58" y="32" width="240" height="8" rx="4" fill="#0e0f13"/>
      <rect x="58" y="32" width="240" height="8" rx="4" fill="url(#bar1)"/>
      <text x="0" y="74">Edit</text>
      <rect x="58" y="66" width="240" height="8" rx="4" fill="#0e0f13"/>
      <rect x="58" y="66" width="172" height="8" rx="4" fill="url(#bar2)"/>
      <text x="0" y="108">Read</text>
      <rect x="58" y="100" width="240" height="8" rx="4" fill="#0e0f13"/>
      <rect x="58" y="100" width="120" height="8" rx="4" fill="url(#bar1)"/>
      <text x="0" y="142">Write</text>
      <rect x="58" y="134" width="240" height="8" rx="4" fill="#0e0f13"/>
      <rect x="58" y="134" width="64" height="8" rx="4" fill="url(#bar2)"/>
      <text x="0" y="176">Grep</text>
      <rect x="58" y="168" width="240" height="8" rx="4" fill="#0e0f13"/>
      <rect x="58" y="168" width="44" height="8" rx="4" fill="url(#bar1)"/>
    </g>
  </g>
</svg>
