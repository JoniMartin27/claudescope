<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ClaudeScope">
  <defs>
    <radialGradient id="bg" cx="35%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#20242f"/>
      <stop offset="100%" stop-color="#0e0f13"/>
    </radialGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36c5d0"/>
      <stop offset="100%" stop-color="#d97757"/>
    </linearGradient>
  </defs>
  <!-- maskable: keep art within the central safe zone -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="rotate(38 256 256)">
    <!-- telescope barrel -->
    <rect x="150" y="232" width="250" height="64" rx="32" fill="#d97757"/>
    <rect x="150" y="232" width="250" height="64" rx="32" fill="#000" opacity="0.12"/>
    <!-- wide eyepiece -->
    <rect x="360" y="214" width="58" height="100" rx="20" fill="#b86a4c"/>
    <!-- big objective lens -->
    <circle cx="150" cy="264" r="58" fill="#20242f" stroke="url(#lens)" stroke-width="16"/>
    <circle cx="150" cy="264" r="26" fill="url(#lens)" opacity="0.85"/>
  </g>
  <!-- tripod -->
  <g stroke="#36c5d0" stroke-width="18" stroke-linecap="round">
    <line x1="256" y1="300" x2="200" y2="392"/>
    <line x1="256" y1="300" x2="312" y2="392"/>
  </g>
  <!-- stars -->
  <g fill="#e7e9ee">
    <circle cx="120" cy="120" r="9"/>
    <circle cx="392" cy="150" r="6"/>
    <circle cx="340" cy="96" r="4"/>
  </g>
</svg>
